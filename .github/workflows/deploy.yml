name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ secrets.REGISTRY_IMAGE }}:${{ github.sha }}
            ${{ secrets.REGISTRY_IMAGE }}:latest

      - name: Deploy to K3s VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: kamal
          key: ${{ secrets.CI_CD_SSH_KEY }}
          script: |
            cd /home/kamal/infrastructure/apps/portfolio-portal/k8s/
            sed -i 's|image:.*|image: ${{ secrets.REGISTRY_IMAGE }}:${{ github.sha }}|g' deployment.yaml
            sudo k3s kubectl apply -f .
            sudo k3s kubectl rollout status deployment portfolio-portal-deployment -n portfolio-prod